<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    background: #141414;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    padding: 20px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .logo-n {
    font-size: 28px;
    font-weight: 900;
    color: #E50914;
    letter-spacing: -1px;
  }
  .logo-title {
    font-size: 13px;
    font-weight: 600;
    color: #aaa;
    line-height: 1.3;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 9px 12px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 5px;
    color: #fff;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #E50914; }
  input::placeholder { color: #555; }
  .save-btn {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: #E50914;
    border: none;
    border-radius: 5px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: #b20710; }
  .status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    color: #4ade80;
    min-height: 16px;
    transition: opacity 0.3s;
  }
  .divider {
    border: none;
    border-top: 1px solid #2a2a2a;
    margin: 18px 0;
  }
  .help {
    font-size: 11px;
    color: #666;
    line-height: 1.6;
  }
  .help a {
    color: #E50914;
    text-decoration: none;
  }
  .help a:hover { text-decoration: underline; }

  /* Top 3 section */
  .top3-section { margin-top: 0; }
  .top3-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .top3-title {
    font-size: 13px;
    font-weight: 700;
    color: #aaa;
  }
  .source-tabs {
    display: flex;
    gap: 4px;
  }
  .source-tab {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #444;
    background: #2a2a2a;
    color: #888;
    transition: all 0.2s;
  }
  .source-tab:hover { border-color: #666; color: #ccc; }
  .source-tab.active {
    background: #E50914;
    border-color: #E50914;
    color: #fff;
  }
  .top3-list { display: flex; flex-direction: column; gap: 8px; }
  .top3-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #1e1e1e;
    border-radius: 6px;
    border: 1px solid #333;
  }
  .top3-rank {
    font-size: 16px;
    font-weight: 900;
    color: #E50914;
    min-width: 18px;
    text-align: center;
  }
  .top3-info {
    flex: 1;
    min-width: 0;
  }
  .top3-name {
    font-size: 12px;
    font-weight: 600;
    color: #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: color 0.2s;
  }
  .top3-name:hover { color: #E50914; text-decoration: underline; }
  .top3-score {
    font-size: 11px;
    font-weight: 800;
    margin-top: 2px;
  }
  .top3-score.great { color: #4ade80; }
  .top3-score.ok { color: #facc15; }
  .top3-score.bad { color: #f87171; }
  .top3-skip {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #444;
    background: transparent;
    color: #666;
    transition: all 0.2s;
  }
  .top3-skip:hover { border-color: #888; color: #ccc; }
  .top3-empty {
    font-size: 12px;
    color: #555;
    text-align: center;
    padding: 16px 0;
  }

  .api-status {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .api-status.ok { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .api-status.limit { background: rgba(249,115,22,0.1); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
  .api-status.invalid { background: rgba(229,9,20,0.1); color: #f87171; border: 1px solid rgba(229,9,20,0.3); }
  .api-status.unknown { background: rgba(255,255,255,0.05); color: #666; border: 1px solid #333; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ok .status-dot { background: #4ade80; }
  .limit .status-dot { background: #f97316; }
  .invalid .status-dot { background: #f87171; }
  .unknown .status-dot { background: #555; }
  .badge-preview {
    display: flex;
    gap: 6px;
    margin: 10px 0 4px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px 2px 4px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 800;
    background: #1a1a1a;
  }
  .pill-imdb { border: 1px solid rgba(245,197,24,0.6); }
  .pill-imdb span { color: #4ade80; }
  .pill-rt { border: 1px solid rgba(74,222,128,0.5); }
  .pill-rt span { color: #4ade80; }
  .pill-mc { border: 1px solid rgba(255,204,0,0.6); }
  .pill-mc .pill-mc-logo {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; background: #ffcc00; color: #000;
    font-size: 9px; font-weight: 900; border-radius: 3px;
    font-family: Arial Black, Arial, sans-serif;
  }
  .pill-mc span { color: #4ade80; }
</style>
</head>
<body>
<div class="logo">
  <span class="logo-n">N</span>
  <span class="logo-title">Rating Overlay<br><span style="color:#555;font-weight:400">IMDb + Rotten Tomatoes + Metacritic</span></span>
</div>

<div class="api-status unknown" id="apiStatus">
  <span class="status-dot"></span>
  <span id="apiStatusText">Checking...</span>
</div>
<label>OMDb API Key</label>
<input type="text" id="apiKey" placeholder="貼上你的 OMDb API Key..." />
<button class="save-btn" id="saveBtn">儲存</button>
<div class="status" id="status"></div>

<hr class="divider">

<div class="top3-section">
  <div class="top3-header">
    <span class="top3-title">Top 3 評分</span>
    <div class="source-tabs">
      <button class="source-tab active" data-source="imdb">IMDb</button>
      <button class="source-tab" data-source="rt">RT</button>
      <button class="source-tab" data-source="mc">MC</button>
    </div>
  </div>
  <div class="top3-list" id="top3List">
    <div class="top3-empty">尚無掃描資料，請先開啟 Netflix</div>
  </div>
</div>

<hr class="divider">

<div class="help">
  <strong style="color:#aaa">預覽效果：</strong>
  <div class="badge-preview">
    <span class="pill pill-imdb">
      <svg viewBox="0 0 48 20" width="30" height="13"><rect width="48" height="20" rx="3" fill="#F5C518"/><text x="50%" y="14" text-anchor="middle" font-size="10" font-weight="900" font-family="Arial" fill="#000">IMDb</text></svg>
      <span>8.4</span>
    </span>
    <span class="pill pill-rt">🍅 <span>94%</span></span>
    <span class="pill pill-mc"><span class="pill-mc-logo">M</span> <span>82/100</span></span>
  </div>
  <br>
  免費 API Key 請到：<br>
  <a href="https://www.omdbapi.com/apikey.aspx" target="_blank">omdbapi.com/apikey.aspx</a><br>
  （免費版每天 1,000 次查詢）
</div>

<script src="popup.js"></script>
</body>
</html>
