<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    background: #141414;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    padding: 20px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .logo-n {
    font-size: 28px;
    font-weight: 900;
    color: #E50914;
    letter-spacing: -1px;
  }
  .logo-title {
    font-size: 13px;
    font-weight: 600;
    color: #aaa;
    line-height: 1.3;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 9px 12px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 5px;
    color: #fff;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #E50914; }
  input::placeholder { color: #555; }
  .save-btn {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: #E50914;
    border: none;
    border-radius: 5px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: #b20710; }
  .status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    color: #4ade80;
    min-height: 16px;
    transition: opacity 0.3s;
  }
  .divider {
    border: none;
    border-top: 1px solid #2a2a2a;
    margin: 18px 0;
  }
  .help {
    font-size: 11px;
    color: #666;
    line-height: 1.6;
  }
  .help a {
    color: #E50914;
    text-decoration: none;
  }
  .help a:hover { text-decoration: underline; }

  /* Ranking sections */
  .ranking-section { margin-top: 0; }
  .ranking-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .ranking-label {
    font-size: 13px;
    font-weight: 700;
    color: #aaa;
  }
  .source-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .tab-group { display: flex; gap: 4px; }
  .tab-btn {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #444;
    background: #2a2a2a;
    color: #888;
    transition: all 0.2s;
  }
  .tab-btn:hover { border-color: #666; color: #ccc; }
  .tab-btn.active {
    background: #E50914;
    border-color: #E50914;
    color: #fff;
  }
  .rank-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
    padding-right: 2px;
  }
  .rank-list::-webkit-scrollbar { width: 4px; }
  .rank-list::-webkit-scrollbar-track { background: transparent; }
  .rank-list::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
  .rank-list::-webkit-scrollbar-thumb:hover { background: #666; }
  .rank-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: #1e1e1e;
    border-radius: 6px;
    border: 1px solid #333;
    flex-shrink: 0;
  }
  .rank-item.top3 { border-color: rgba(229,9,20,0.4); }
  .rank-num {
    font-size: 14px;
    font-weight: 900;
    min-width: 20px;
    text-align: center;
    color: #555;
  }
  .rank-item.top3 .rank-num { color: #E50914; font-size: 16px; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name {
    font-size: 12px;
    font-weight: 600;
    color: #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: color 0.2s;
  }
  .rank-name:hover { color: #E50914; text-decoration: underline; }
  .rank-meta { font-size: 10px; color: #666; margin-top: 1px; }
  .rank-score { font-size: 11px; font-weight: 800; }
  .rank-score.great { color: #4ade80; }
  .rank-score.ok { color: #facc15; }
  .rank-score.bad { color: #f87171; }
  .rank-skip {
    padding: 3px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #444;
    background: transparent;
    color: #666;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .rank-skip:hover { border-color: #888; color: #ccc; }
  .rank-empty {
    font-size: 12px;
    color: #555;
    text-align: center;
    padding: 12px 0;
  }
  .rank-count {
    font-size: 10px;
    color: #555;
    text-align: right;
    margin-top: 4px;
  }
  .exclude-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .exclude-btn {
    flex: 1;
    padding: 4px 6px;
    font-size: 10px;
    font-weight: 700;
    border: 1px solid #444;
    border-radius: 4px;
    background: #2a2a2a;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
  }
  .exclude-btn:hover { border-color: #666; color: #ccc; }
  .exclude-btn-ok { border-color: rgba(74,222,128,0.5) !important; color: #4ade80 !important; }
  .exclude-footer { display: flex; align-items: center; justify-content: space-between; }
  .exclude-clear {
    padding: 2px 8px;
    font-size: 10px;
    border: 1px solid #444;
    border-radius: 4px;
    background: transparent;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
  }
  .exclude-clear:hover { color: #f87171; border-color: #f87171; }
  .exclude-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 3px 0; font-size: 10px; color: #666; border-bottom: 1px solid #222;
  }
  .exclude-list-item:last-child { border-bottom: none; }
  .exclude-list-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 6px; }
  .exclude-restore { background: none; border: none; color: #555; cursor: pointer; font-size: 11px; padding: 0 2px; flex-shrink: 0; }
  .exclude-restore:hover { color: #4ade80; }
  #excludeList::-webkit-scrollbar { width: 3px; }
  #excludeList::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .api-status {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .api-status.ok { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .api-status.limit { background: rgba(249,115,22,0.1); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
  .api-status.invalid { background: rgba(229,9,20,0.1); color: #f87171; border: 1px solid rgba(229,9,20,0.3); }
  .api-status.unknown { background: rgba(255,255,255,0.05); color: #666; border: 1px solid #333; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ok .status-dot { background: #4ade80; }
  .limit .status-dot { background: #f97316; }
  .invalid .status-dot { background: #f87171; }
  .unknown .status-dot { background: #555; }
  .badge-preview {
    display: flex;
    gap: 6px;
    margin: 10px 0 4px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px 2px 4px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 800;
    background: #1a1a1a;
  }
  .pill-imdb { border: 1px solid rgba(245,197,24,0.6); }
  .pill-imdb span { color: #4ade80; }
  .pill-rt { border: 1px solid rgba(74,222,128,0.5); }
  .pill-rt span { color: #4ade80; }
  .pill-mc { border: 1px solid rgba(255,204,0,0.6); }
  .pill-mc .pill-mc-logo {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; background: #ffcc00; color: #000;
    font-size: 9px; font-weight: 900; border-radius: 3px;
    font-family: Arial Black, Arial, sans-serif;
  }
  .pill-mc span { color: #4ade80; }
</style>
</head>
<body>
<div class="logo">
  <span class="logo-n">N</span>
  <span class="logo-title">Rating Overlay<br><span style="color:#555;font-weight:400">IMDb + Rotten Tomatoes + Metacritic</span></span>
</div>

<div class="api-status unknown" id="apiStatus">
  <span class="status-dot"></span>
  <span id="apiStatusText">Checking...</span>
</div>
<label>OMDb API Key</label>
<input type="text" id="apiKey" data-i18n-placeholder="placeholder_apikey" placeholder="Paste your OMDb API Key..." />
<button class="save-btn" id="saveBtn" data-i18n="save">Save</button>
<div class="status" id="status"></div>

<hr class="divider">

<div class="ranking-section">
  <div class="source-row">
    <span style="font-size:10px;color:#666" data-i18n="sort_by">Sort by</span>
    <div class="tab-group" id="sourceTabs">
      <button class="tab-btn active" data-source="imdb">IMDb</button>
      <button class="tab-btn" data-source="rt">RT</button>
      <button class="tab-btn" data-source="mc">MC</button>
      <button class="tab-btn" data-source="awards" data-i18n="awards">Awards</button>
    </div>
  </div>

  <div class="ranking-header">
    <div class="tab-group" id="typeTabs">
      <button class="tab-btn active" data-type="movie">Movie</button>
      <button class="tab-btn" data-type="series">TV Show</button>
    </div>
    <span class="rank-count" id="rankCount"></span>
  </div>
  <div id="cacheStats" style="font-size:10px;color:#444;text-align:right;margin-bottom:4px;"></div>
  <div class="rank-list" id="rankList">
    <div class="rank-empty" data-i18n="no_data">No data yet</div>
  </div>
</div>

<hr class="divider">

<div>
  <div style="font-size:10px;color:#555;margin-bottom:6px" data-i18n="exclude_label">Exclude from ranking</div>
  <div class="exclude-row">
    <button class="exclude-btn" id="importBtn" data-i18n="import_csv">Import CSV</button>
    <button class="exclude-btn" id="syncNetflixBtn" data-i18n="sync_netflix">Netflix History</button>
    <input type="file" id="importFile" accept=".csv,.txt" style="display:none">
  </div>
  <div class="exclude-footer">
    <button id="toggleExcludeBtn" style="display:none;font-size:10px;color:#555;background:none;border:none;cursor:pointer;padding:0;"></button>
    <button id="restoreAllBtn" class="exclude-clear" style="display:none" data-i18n="restore_all">Restore all</button>
  </div>
  <div id="excludeList" style="display:none;max-height:100px;overflow-y:auto;margin-top:6px;"></div>
</div>

<hr class="divider">

<div class="help">
  <strong style="color:#aaa" data-i18n="preview">Preview:</strong>
  <div class="badge-preview">
    <span class="pill pill-imdb">
      <svg viewBox="0 0 48 20" width="30" height="13"><rect width="48" height="20" rx="3" fill="#F5C518"/><text x="50%" y="14" text-anchor="middle" font-size="10" font-weight="900" font-family="Arial" fill="#000">IMDb</text></svg>
      <span>8.4</span>
    </span>
    <span class="pill pill-rt">🍅 <span>94%</span></span>
    <span class="pill pill-mc"><span class="pill-mc-logo">M</span> <span>82/100</span></span>
  </div>
  <br>
  <span data-i18n="api_help">Get a free API Key at:</span><br>
  <a href="https://www.omdbapi.com/apikey.aspx" target="_blank">omdbapi.com/apikey.aspx</a><br>
  <span data-i18n="api_limit">(Free tier: 1,000 requests/day)</span>
</div>

<script src="popup.js"></script>
</body>
</html>
